<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="{{ page.description | default: site.description }}">
    <meta name="keywords" content="{{ site.keywords | join: ', ' }}">
    <meta name="theme-color" content="{{ site.theme_color }}">

    <title>{% if page.title %}{{ page.title }} - {{ site.seo_title }}{% else %}{{ site.seo_title }}{% endif %}</title>

    {% if site.features.pwa %}
    <link rel="manifest" href="{{ '/pwa/manifest.json' | relative_url }}">
    {% endif %}

    <link rel="shortcut icon" href="{{ '/img/favicon.ico' | relative_url }}">
    <link rel="apple-touch-icon" href="{{ '/img/apple-touch-icon.png' | relative_url }}">
    <link rel="canonical" href="{{ page.url | replace: 'index.html', '' | absolute_url }}">

    <link rel="stylesheet" href="{{ '/css/bootstrap.min.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/css/hux-blog.min.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/css/syntax.css' | relative_url }}">
    <link href="//cdnjs.cloudflare.com/ajax/libs/font-awesome/4.6.3/css/font-awesome.min.css" rel="stylesheet" type="text/css">

    <!--[if lt IE 9]>
        <script src="https://oss.maxcdn.com/libs/html5shiv/3.7.0/html5shiv.js"></script>
        <script src="https://oss.maxcdn.com/libs/respond.js/1.4.2/respond.min.js"></script>
    <![endif]-->
</head>
